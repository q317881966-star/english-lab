<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2d3d"/>
      <stop offset="100%" stop-color="#0d1116"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- 书本 -->
  <g transform="translate(160,120)">
    <rect x="0" y="20" width="190" height="240" rx="12" fill="#161b22" stroke="#e3b341" stroke-width="6"/>
    <rect x="10" y="30" width="170" height="60" rx="6" fill="#1c2333"/>
    <line x1="10" y1="110" x2="120" y2="110" stroke="#e3b341" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="140" x2="150" y2="140" stroke="#8b949e" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="165" x2="130" y2="165" stroke="#8b949e" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="190" x2="140" y2="190" stroke="#8b949e" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="215" x2="100" y2="215" stroke="#8b949e" stroke-width="3" stroke-linecap="round"/>
    <!-- 字母 E -->
    <text x="50" y="78" font-family="Inter,-apple-system,sans-serif" font-size="36" font-weight="700" fill="#e3b341">E</text>
  </g>
  <!-- 对话气泡 -->
  <g transform="translate(290,140)">
    <rect x="0" y="0" width="110" height="75" rx="20" fill="#e3b341" opacity="0.15" stroke="#e3b341" stroke-width="4"/>
    <polygon points="20,75 35,95 50,75" fill="#1a2d3d" stroke="#e3b341" stroke-width="4"/>
    <circle cx="30" cy="35" r="10" fill="#e3b341" opacity="0.4"/>
    <circle cx="55" cy="35" r="6" fill="#e3b341" opacity="0.6"/>
    <circle cx="75" cy="35" r="4" fill="#e3b341" opacity="0.8"/>
  </g>
  <!-- 播放按钮 -->
  <circle cx="370" cy="280" r="45" fill="#e3b341" opacity="0.2" stroke="#e3b341" stroke-width="5"/>
  <polygon points="355,260 355,300 395,280" fill="#e3b341"/>
</svg>
