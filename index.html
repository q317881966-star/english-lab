<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>English Lab — 句型学习</title>

  <meta name="theme-color" content="#0d1116">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="English Lab">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">

  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</head>
<body>

<div class="app">

  <!-- 顶部栏 -->
  <header class="header">
    <button class="header-btn" id="btn-week-picker" aria-label="选择周">
      <span id="header-week">第1周</span>
    </button>
    <div class="header-center">
      <div class="header-theme" id="header-theme">自我介绍与基础社交</div>
    </div>
    <div class="header-days" id="header-days"></div>
  </header>

  <!-- 主内容区 -->
  <main class="main" id="main-content">
    <!-- 动态渲染 -->
  </main>

  <!-- 底部操作栏 -->
  <footer class="footer">
    <button class="footer-btn" id="btn-prev">◀ 上一天</button>
    <button class="footer-btn primary" id="btn-done">✅ 完成今日</button>
    <button class="footer-btn" id="btn-next">下一天 ▶</button>
  </footer>

  <!-- 周选择弹窗 -->
  <div class="sheet-overlay" id="week-overlay">
    <div class="sheet">
      <div class="sheet-header">
        <h3>选择学习周</h3>
        <button class="sheet-close" id="btn-week-close">✕</button>
      </div>
      <div class="sheet-body" id="week-list"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div>

<!-- 数据 -->
<script src="data/studyPlan.js"></script>
<script src="data/patterns.js"></script>

<!-- 核心 -->
<script src="js/voice.js"></script>
<script src="js/app.js"></script>

</body>
</html>
